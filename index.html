    <script>
      (function(){
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if(p){
          var clean = p.startsWith('/') ? p : '/' + p;
          window.history.replaceState(null, '', clean);
        }
      })();
    </script>
